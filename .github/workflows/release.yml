name: Release CLI Tool
on:
  push:
    tags:
      - 'v*.*.*' # Trigger on new tags like v1.0.0
jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    permissions:
      contents: write # Grants permission to create releases and upload assets

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Nix
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          # Enable flakes and unified CLI
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Enter the Nix development shell and run commands
      - name: Run tidy
        run: nix develop --command just tidy

      - name: Run check
        run: nix develop --command just check

      - name: Build all platforms
        run: nix develop --command just build-all

      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # Use the tag version in file name
          files: |
            bin/apiright-linux-amd64
            bin/apiright-linux-arm64
            bin/apiright-windows-amd64.exe
            bin/apiright-darwin-amd64
            bin/apiright-darwin-arm64
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
