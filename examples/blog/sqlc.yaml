version: "2"
sql:
  - engine: "sqlite"
    queries:
      - "queries/"
      - "gen/sql/"
    schema: "migrations/"
    gen:
      go:
        package: "db"
        out: "gen/go"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
