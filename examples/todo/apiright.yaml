# APIRight Configuration - Todo API Example
# This file demonstrates all configuration options

project:
  name: "todo-api"
  module: "github.com/example/todo-api"
  version: "0.1.0"
  description: "Complete Todo API demonstrating all APIRight features"

database:
  type: "sqlite"
  name: "todo.db"
  host: "localhost"
  port: 5432
  user: ""
  password: ""
  ssl_mode: "disable"

server:
  http_port: 8080
  grpc_port: 9090
  host: "0.0.0.0"
  timeout: 30
  read_timeout: 10
  write_timeout: 10

generation:
  output_dir: "gen"
  gen_suffix: "_ar_gen"
  content_types:
    - "application/json"
    - "application/xml"
    - "application/yaml"
    - "application/protobuf"
    - "text/plain"
  generate_tests: true
  generate_docs: true
  validation: true
  openapi:
    enabled: true
    output: "gen/openapi"
    title: "Todo API"
    version: "0.1.0"

# Plugin configuration
# Plugins are loaded from ./plugins/ directory at runtime
# To add a plugin, compile it with: go build -buildmode=plugin -o plugins/myplugin.so
plugins:
  - name: "custom-logging"
    path: "./plugins/logging.so"
    enabled: true
  - name: "custom-validation"
    path: "./plugins/validation.so"
    enabled: true
  - name: "custom-middleware"
    path: "./plugins/middleware.so"
    enabled: true

# Middleware configuration
middleware:
  logging:
    enabled: true
    level: "info"
  recovery:
    enabled: true
  request_id:
    enabled: true
  cors:
    enabled: false
    allowed_origins:
      - "*"
    allowed_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
    allowed_headers:
      - "*"

# Logging configuration
logging:
  level: "info"
  format: "json"  # "json" for production, "console" for development
  output: "stdout"  # "stdout" or file path
